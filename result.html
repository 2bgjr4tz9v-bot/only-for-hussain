<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Score ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#fff5fa);
}

.container{

width:90%;
max-width:500px;
background:white;
padding:35px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);

}

#ready{

font-size:40px;
color:#ff3f81;

}

#count{

font-size:70px;
color:#ff4f8b;
margin:20px;

}

.result{

display:none;

}

h1{

color:#ff3f81;

}

.score{

font-size:60px;
margin:25px;
color:#333;

}


.thanks{

font-size:30px;
color:#ff3f81;
margin-bottom:25px;

}


button{

background:#ff4f8b;
color:white;
border:none;
padding:15px 40px;
font-size:20px;
border-radius:50px;
cursor:pointer;

}


</style>

</head>


<body>


<div class="container">


<div id="ready">
Ready ❤️
</div>


<div id="count">
3
</div>



<div class="result" id="result">


<h1>
Your Score
</h1>


<div class="score" id="score">
</div>


<div class="thanks">
Thank You ❤️
</div>


<a href="letter.html">

<button>
Open Your Letter 💌
</button>

</a>


</div>


</div>



<script>

let count=3;


let timer=setInterval(()=>{


count--;

document.getElementById("count").innerHTML=count;


if(count==0){


clearInterval(timer);


document.getElementById("ready").style.display="none";

document.getElementById("count").style.display="none";


let score=localStorage.getItem("score");


document.getElementById("score").innerHTML=
score + "/5 ❤️";


document.getElementById("result").style.display="block";


}


},1000);


</script>


</body>

</html>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hussain Quiz ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#fff5fa);
transition:.4s;

}

.container{

width:90%;
max-width:600px;
background:white;
padding:30px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.hearts{

font-size:30px;
margin-bottom:20px;

}

.timer{

font-size:50px;
margin-bottom:20px;

animation:move 1s infinite alternate;

}


@keyframes move{

from{
transform:translateY(0);
}

to{
transform:translateY(8px);
}

}


h1{

color:#ff3f81;
margin-bottom:20px;

}


.question{

font-size:22px;
color:#555;
margin-bottom:20px;

}


textarea{

width:100%;
height:100px;
border-radius:20px;
border:2px solid #ffc0d5;
padding:15px;
font-size:18px;
resize:none;

}


button{

margin-top:20px;
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff4f8b;
color:white;
font-size:20px;
cursor:pointer;

animation:pulse 1.5s infinite;

}


@keyframes pulse{

50%{
transform:scale(1.08);
}

}


.correct{

animation:celebrate .8s;

}


@keyframes celebrate{

50%{
transform:scale(1.05);
}

}


.wrong{

background:#ffb3b3;

}


.shake{

animation:shake .5s;

}


@keyframes shake{

25%{
transform:translateX(-10px);
}

50%{
transform:translateX(10px);
}

75%{
transform:translateX(-10px);
}

}


.message{

font-size:45px;
display:none;
margin:20px;

}


.balloons{

font-size:40px;

}


</style>

</head>


<body>


<div class="container" id="box">


<div class="hearts" id="hearts">
❤️❤️❤️❤️❤️
</div>


<div class="timer">
⏳
</div>


<h1>Question ❤️</h1>


<div class="question" id="question"></div>


<textarea id="answer" placeholder="Write your answer..."></textarea>


<button onclick="checkAnswer()">Check ❤️</button>


<div class="message" id="message"></div>


<button id="next" onclick="nextQuestion()" style="display:none">
Next ➡️
</button>


</div>



<script>


let questions=[

{
q:"أول مقابلة لينا كنت لابسة طرحة لونها إيه؟",
a:"اسود"
},

{
q:"أكتر أكلة بحبها إيه؟",
a:"حواوشي"
},

{
q:"أكتر مغني نفسي أحضرله حفلة مين؟",
a:"تامر"
},

{
q:"بتحبني ولا لا؟",
a:"لا"
},

{
q:"هنتجوز إمتى؟",
a:"ربنا يسهل"
}

];


let index=0;

let hearts=5;

let time=30;

let timer;


function loadQuestion(){

document.getElementById("question").innerHTML=
questions[index].q;

document.getElementById("answer").value="";

time=30;

clearInterval(timer);

timer=setInterval(()=>{

time--;

if(time<=0){

wrong();

}

},1000);

}


function checkAnswer(){

let user=document.getElementById("answer").value.toLowerCase();


if(user.includes(questions[index].a)){

correct();

}

else{

wrong();

}

}



function correct(){

clearInterval(timer);

document.body.className="correct";

document.getElementById("message").innerHTML=
"🎈❤️🎈";

document.getElementById("message").style.display="block";

document.getElementById("next").style.display="inline-block";


}


function wrong(){

clearInterval(timer);

hearts--;

document.getElementById("hearts").innerHTML=
"❤️".repeat(hearts)+"🖤";


document.body.classList.add("wrong");

document.getElementById("box").classList.add("shake");


document.getElementById("message").innerHTML=
"Oppss 😅";


document.getElementById("message").style.display="block";


setTimeout(()=>{

nextQuestion();

},1500);


}



function nextQuestion(){

document.body.className="";

document.getElementById("message").style.display="none";

document.getElementById("box").classList.remove("shake");


index++;


if(index<questions.length){

loadQuestion();

}

else{

window.location.href="result.html";

}

}


loadQuestion();


</script>


</body>

</html>

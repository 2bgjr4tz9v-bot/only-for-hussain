<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Only For Hussain ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0,#fff5fa);
overflow:hidden;
}

.container{
width:90%;
max-width:900px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(18px);
border-radius:30px;
padding:40px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

h1{
font-size:50px;
color:#ff3f81;
margin-bottom:20px;
}

p{
font-size:22px;
color:#555;
margin-bottom:30px;
}

img{
width:300px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

button{
background:#ff4f8b;
color:white;
border:none;
padding:18px 45px;
font-size:22px;
border-radius:50px;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px pink;
}

.heart{
position:absolute;
color:pink;
animation:float 8s linear infinite;
font-size:25px;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

100%{
transform:translateY(-100vh);
opacity:1;
}

}

</style>
@media (max-width:600px){

.container{
width:90%;
padding:25px;
}

h1{
font-size:32px;
}

p{
font-size:18px;
}

img{
width:220px;
}

button{
font-size:18px;
padding:15px 35px;
}

}
</head>

<body>

<div class="container">

<h1>Hii Hussein ❤️</h1>

<p>This made with all my love 🤍</p>

<img src="love.jpeg.jpeg">

<br>

<a href="questions.html">
<button>Yalla Bena ❤️</button>
</a>

</div>


<script>

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

}

</script>

</body>

</html>

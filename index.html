<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Only For Hussain ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#ffe6f0,#fff5fa);
overflow:hidden;
}

.container{
width:90%;
max-width:900px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(18px);
border-radius:30px;
padding:40px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

h1{
font-size:50px;
color:#ff3f81;
margin-bottom:20px;
}

p{
font-size:22px;
color:#555;
margin-bottom:30px;
}

button{
background:#ff4f8b;
color:white;
border:none;
padding:18px 45px;
font-size:22px;
border-radius:50px;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px pink;
}

.heart{
position:absolute;
color:pink;
animation:float 8s linear infinite;
font-size:25px;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-100vh);
opacity:1;
}
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome Hussein ❤️</h1>

<p>This surprise was made with all my love 🤍</p>

<img
  src="love.jpeg.jpeg"
  alt="Our Photo"
  style="
    width:320px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(255,105,180,.6);
    border:6px solid white;
    margin:20px 0;
  "
>

<br>
<button>Click Here ❤️</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letter ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#fff5fa);
overflow:hidden;

}


.envelope{

width:280px;
height:180px;
background:#ffb6c9;
border-radius:15px;
position:relative;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,.2);

}


.flap{

position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:140px solid transparent;
border-right:140px solid transparent;
border-top:90px solid #ff8fb1;
transition:1s;

}


.heart-seal{

position:absolute;
top:65px;
left:115px;
font-size:50px;
animation:pulse 1.2s infinite;
z-index:2;

}


@keyframes pulse{

50%{
transform:scale(1.15);
}

}


.message{

display:none;
font-size:55px;
color:#ff3f81;
animation:show 1.5s;

}


@keyframes show{

from{
opacity:0;
transform:scale(.5);
}

to{
opacity:1;
transform:scale(1);
}

}


.open .flap{

transform:rotateX(180deg);

}


.open .heart-seal{

display:none;

}


.open .envelope{

display:none;

}


.open .message{

display:block;

}


</style>

</head>


<body>


<div id="box">


<div class="envelope" onclick="openLetter()">

<div class="flap"></div>

<div class="heart-seal">
❤️
</div>

</div>


<div class="message">
بحبكككك♥️
</div>


</div>



<script>

function openLetter(){

document.getElementById("box").classList.add("open");

}

</script>


</body>

</html>

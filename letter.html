<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Hussain ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#fff5fa);
overflow:hidden;

}


.container{

text-align:center;

}


.envelope{

width:280px;
height:180px;
background:#fff;
position:relative;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
cursor:pointer;
}


.flap{

position:absolute;
top:0;
left:0;

width:0;
height:0;

border-left:140px solid transparent;
border-right:140px solid transparent;
border-top:90px solid #ff8fb3;

transform-origin:top;

transition:.8s;

}


.heart{

position:absolute;
top:65px;
left:115px;

font-size:50px;

animation:beat 1s infinite;

}


@keyframes beat{

50%{
transform:scale(1.2);
}

}


.message{

display:none;

background:white;
padding:30px;
border-radius:25px;
width:300px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

font-size:22px;
color:#ff3f81;

}


.open .flap{

transform:rotateX(180deg);

}


.open .heart{

display:none;

}


.open + .message{

display:block;

}


</style>

</head>


<body>


<div class="container">


<div class="envelope" onclick="openLetter()">

<div class="flap"></div>

<div class="heart">
❤️
</div>

</div>


<div class="message" id="message">

بحبكككك ❤️

<br><br>

ربنا يجمعنا على خير 🤍

</div>


</div>



<script>

function openLetter(){

document.querySelector(".envelope")
.classList.add("open");


document.getElementById("message")
.style.display="block";


}

</script>


</body>

</html>
